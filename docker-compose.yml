# Referência para rodar com Docker (VPS sem EasyPanel, ou teste local).
# No EasyPanel, crie um App apontando para este Dockerfile e monte um volume
# em /data — veja o README.
services:
  app:
    build: .
    restart: unless-stopped
    environment:
      DATABASE_PATH: /data/app.db
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?defina ADMIN_PASSWORD}
      SESSION_SECRET: ${SESSION_SECRET:?defina SESSION_SECRET}
    volumes:
      # É este volume que faz o catálogo sobreviver a um redeploy.
      - catalog-data:/data
    ports:
      - '3000:3000'

volumes:
  catalog-data:
