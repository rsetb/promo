# Referência para rodar app + banco juntos (VPS sem EasyPanel, ou teste local
# com Docker). No EasyPanel, prefira criar dois serviços pela interface: um
# Postgres e um App apontando para este Dockerfile — veja o README.
services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: promo
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?defina POSTGRES_PASSWORD}
      POSTGRES_DB: promo
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U promo -d promo']
      interval: 10s
      timeout: 5s
      retries: 5
    # Sem `ports:` de propósito: o banco fica só na rede interna do Docker,
    # acessível ao app e a mais ninguém.

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://promo:${POSTGRES_PASSWORD}@db:5432/promo
      DATABASE_SSL: 'false'
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?defina ADMIN_PASSWORD}
      SESSION_SECRET: ${SESSION_SECRET:?defina SESSION_SECRET}
    ports:
      - '3000:3000'

volumes:
  db-data:
